<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baflix - Premium Streaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default,es6,fetch"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #e50914; --secondary: #b81d24; --dark: #141414; --light-dark: #222; --text: #fff; --text-secondary: #aaa; --green: #28a745; --dark-green: #218838; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        header { padding: 20px; text-align: center; }
        .logo {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #e50914, #f5f5f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-animation: flicker 1.5s infinite alternate;
            animation: flicker 1.5s infinite alternate;
            margin-bottom: 15px;
            cursor: pointer;
        }
        @-webkit-keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 40px var(--primary), 0 0 80px var(--primary); } 20%, 24%, 55% { text-shadow: none; } }
        @keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 40px var(--primary), 0 0 80px var(--primary); } 20%, 24%, 55% { text-shadow: none; } }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .social-icons a { display: inline-block; transition: transform 0.3s; }
        .social-icons img { width: 28px; height: 28px; object-fit: contain; filter: grayscale(1); transition: filter 0.3s; }
        .social-icons a:hover img { filter: grayscale(0); }

        .search-container-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto 20px;
            padding: 20px 20px 0;
        }
        .search-container {
            display: flex;
            flex-grow: 1;
        }
        #search-form {
            display: flex;
            width: 100%;
        }
        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 25px 0 0 25px;
            background: var(--light-dark);
            color: var(--text);
            font-size: 1rem;
        }
        .search-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 0 25px 25px 0;
            background: var(--primary);
            color: var(--text);
            cursor: pointer;
        }

        .controls-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 0 20px;
            flex-wrap: wrap;
        }

        #sort-by {
            padding: 8px 15px;
            border-radius: 20px;
            background: var(--light-dark);
            color: var(--text);
            border: 1px solid #444;
            cursor: pointer;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%20fill='%23aaa'%3E%3Cpath%20d='M7%2010l5%205%205-5z'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1.2em;
            padding-right: 30px;
        }
        
        .filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .filter { padding: 8px 15px; border-radius: 20px; background: var(--light-dark); color: var(--text); cursor: pointer; transition: background 0.3s, transform 0.2s; }
        .filter.active { background: var(--primary); font-weight: bold; }

        .user-info-section {
            background: linear-gradient(145deg, #1a1a1a, #222);
            border-radius: 15px;
            padding: 20px;
            margin: 0 20px 25px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 5px 20px rgba(229, 9, 20, 0.2);
            display: none;
        }
        .user-info-section.visible {
            display: block;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-info-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
        }
        .user-welcome-text h3 { color: var(--primary); margin-bottom: 5px; font-size: 1.3rem; }
        .user-welcome-text p { color: var(--text-secondary); font-size: 0.9rem; }
        .user-details { display: flex; flex-direction: column; gap: 15px; }
        .user-detail-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid #333;
        }
        .detail-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .detail-content { flex: 1; }
        .detail-label { color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 3px; }
        .detail-value { color: #fff; font-weight: bold; font-size: 1.1rem; word-break: break-word; }
        .detail-value.small { font-size: 0.9rem; color: var(--text-secondary); }
        .copy-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px 10px;
            transition: all 0.3s ease;
        }
        .copy-btn:hover { transform: scale(1.1); }
        .user-info-close {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        .close-user-info {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .close-user-info:hover { background: var(--secondary); transform: translateY(-2px); }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 0 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-card {
            background: var(--light-dark);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .movie-poster { width: 100%; aspect-ratio: 2 / 3; background-color: #333; overflow: hidden; position: relative; }
        .movie-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .movie-info { padding: 10px; }
        .movie-title { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
        .movie-series-info, .movie-genres, .movie-rating, .movie-year {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .movie-series-info { font-weight: bold; color: var(--green); }
        .language-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 1;
        }
        .upload-date-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: rgba(229, 9, 20, 0.8);
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 1;
        }

        .movie-grid.list-view { display: block; max-width: 800px; }
        .movie-grid.list-view .movie-card { display: flex; gap: 15px; background-color: transparent; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 20px; border-radius: 0; overflow: visible; }
        .movie-grid.list-view .movie-card:last-child { border-bottom: none; }
        .movie-grid.list-view .movie-poster { flex: 0 0 100px; height: 150px; aspect-ratio: auto; position: relative; border-radius: 5px; }
        .movie-grid.list-view .movie-info { padding: 0; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        .movie-grid.list-view .movie-title { font-size: 1.1rem; white-space: normal; }
        .movie-grid.list-view .movie-description-snippet {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            overflow-wrap: break-word;
        }

        #skeleton-loader {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 0 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .skeleton-card { background-color: var(--light-dark); border-radius: 8px; }
        .skeleton-poster { width: 100%; aspect-ratio: 2/3; background-color: #333; }
        .skeleton-info { padding: 10px; }
        .skeleton-line { height: 12px; background-color: #333; border-radius: 4px; margin-bottom: 8px; }
        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); -webkit-animation: shimmer 1.5s infinite; animation: shimmer 1.5s infinite; }
        @-webkit-keyframes shimmer { 100% { left: 100%; } }
        @keyframes shimmer { 100% { left: 100%; } }

        .welcome-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .welcome-popup-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        .welcome-popup-content {
            background: linear-gradient(145deg, #1a1a1a, #222);
            width: 90%;
            max-width: 380px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(229, 9, 20, 0.3);
            transform: scale(0.8) translateY(20px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(229, 9, 20, 0.3);
            position: relative;
        }
        .welcome-popup-overlay.visible .welcome-popup-content {
            transform: scale(1) translateY(0);
        }
        .welcome-popup-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 2002;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
        }
        .welcome-popup-close.visible { opacity: 1; }
        .welcome-popup-close:hover {
            background: var(--primary);
            transform: rotate(90deg);
        }
        .welcome-popup-timer {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--primary);
            color: #fff;
            font-weight: bold;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 2002;
            box-shadow: 0 2px 10px rgba(229, 9, 20, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .welcome-popup-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .welcome-popup-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
        }
        .welcome-popup-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .welcome-popup-image:hover img { transform: scale(1.1); }
        .welcome-popup-text {
            padding: 25px 20px 30px;
            text-align: center;
            cursor: pointer;
        }
        .welcome-popup-text h2 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(229, 9, 20, 0.3);
        }
        .welcome-popup-text p {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 1rem;
        }
        .welcome-popup-click-hint {
            margin-top: 15px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(229, 9, 20, 0.1);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px dashed rgba(229, 9, 20, 0.3);
        }
        .welcome-popup-click-hint i { color: var(--primary); }

        /* --- Dynamic Details View UI CSS (Single Page View Mode) --- */
        #details-view-container { display: none; }
        .back-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; padding: 8px 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.1); }
        .back-header .logo-text { font-size: 1.5rem; font-weight: 700; background: linear-gradient(to right, #e50914, #f5f5f1); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        #details-loading-indicator { display: flex; justify-content: center; align-items: center; min-height: 60vh; flex-direction: column; gap: 20px; }
        .details-spinner { width: 50px; height: 50px; border: 4px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        .details-main-container { max-width: 800px; margin: 0 auto; padding: 20px; display: none; }
        .movie-header-details { display: flex; flex-direction: column; gap: 20px; margin-bottom: 25px; }
        .movie-poster-large { width: 100%; max-width: 300px; margin: 0 auto; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .movie-poster-large img { width: 100%; display: block; }
        .movie-info-details { flex: 1; }
        .movie-title-large { font-size: 2.2rem; margin-bottom: 10px; line-height: 1.2; }
        .movie-meta { color: var(--text-secondary); margin-bottom: 6px; font-size: 1rem; }
        #details-series-info { font-weight: bold; color: var(--green); }
        .trailer-btn { background: var(--primary); color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 8px; transition: background 0.3s; font-size: 1rem; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; border: none; cursor: pointer; margin-top: 15px; }
        .trailer-btn:hover { background: var(--secondary); }
        .movie-description-full { padding: 20px 0; font-size: 1rem; line-height: 1.8; border-top: 1px solid #333; border-bottom: 1px solid #333; margin-bottom: 25px; }
        .actions-section { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; }
        .action-btn { background: #007bff; color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 8px; transition: background 0.3s; font-size: 0.95rem; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: none; }
        .action-btn.copy { background: #6c757d; }
        .action-btn:hover { opacity: 0.8; }
        .download-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); background-size: 300% 300%; color: #fff; text-decoration: none; padding: 15px 20px; border-radius: 12px; font-size: 1.05rem; font-weight: bold; cursor: pointer; display: block; width: 100%; margin: 10px 0; border: none; box-shadow: 0 5px 15px rgba(220, 39, 67, 0.4); text-align: center; position: relative; overflow: hidden; animation: instaGradient 5s ease infinite; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .download-btn::before { content: '\f019'; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-right: 10px; }
        @keyframes instaGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .download-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(220, 39, 67, 0.6); }
        .download-btn:active { transform: translateY(1px) scale(0.98); }
        .downloads-section { margin-top: 20px; }
        .season-accordion { margin-bottom: 8px; }
        .season-accordion-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; cursor: pointer; width: 100%; border-radius: 8px; background: linear-gradient(145deg, #2c3e50, #34495e); border: 1px solid #4a627a; transition: all 0.3s ease; }
        .season-accordion-header:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.3); background: linear-gradient(145deg, #34495e, #4a627a); }
        .season-accordion-header h4 { font-size: 1.1rem; color: var(--text); font-weight: bold; margin: 0; }
        .season-accordion-header .fas { transition: transform 0.3s ease; color: var(--text-secondary); font-size: 1rem; }
        .season-accordion.active .season-accordion-header { background: linear-gradient(145deg, #3a506b, #4a627a); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        .season-accordion.active .season-accordion-header .fas { transform: rotate(180deg); color: var(--text); }
        .season-accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), padding 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background-color: rgba(0,0,0,0.2); border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; padding: 0 15px; }
        .season-accordion.active .season-accordion-content { max-height: 3000px; padding: 20px 15px 10px; }
        .episode-container { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #383838; }
        .episode-container:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .episode-title { color: var(--text-secondary); margin-bottom: 10px; font-weight: bold; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal-overlay.visible { opacity: 1; visibility: visible; }
        .modal-content-video { background: #000; width: 95%; max-width: 900px; position: relative; border-radius: 8px; overflow: hidden; }
        .modal-close-btn { position: absolute; top: 10px; right: 15px; background: none; border: none; color: #fff; font-size: 2.5rem; cursor: pointer; z-index: 2; line-height: 1; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #details-error-message { text-align: center; padding: 50px 20px; display: none; }
        #details-error-message i { font-size: 4rem; color: var(--primary); margin-bottom: 20px; }
        #details-error-message h2 { color: var(--text); margin-bottom: 10px; }
        #details-error-message p { color: var(--text-secondary); }

        @media (min-width: 600px) {
            .movie-header-details { flex-direction: row; align-items: flex-start; }
            .movie-poster-large { max-width: 250px; flex-shrink: 0; }
            .modal-content-video { width: 80%; }
        }
    </style>
</head>
<body>
    <!-- Main App Container (Home Section) -->
    <div id="home-view-container">
        <!-- Welcome Popup -->
        <div id="welcome-popup" class="welcome-popup-overlay">
            <div class="welcome-popup-content" id="welcome-popup-content">
                <button class="welcome-popup-close" id="welcome-popup-close">&times;</button>
                <div class="welcome-popup-timer" id="welcome-popup-timer">5s</div>
                <div class="welcome-popup-image" id="welcome-popup-image">
                    <img src="" alt="Welcome" id="welcome-popup-img">
                </div>
                <div class="welcome-popup-text" id="welcome-popup-text">
                    <h2 id="welcome-popup-title"></h2>
                    <p id="welcome-popup-description"></p>
                    <div class="welcome-popup-click-hint">
                        <i class="fas fa-mouse-pointer"></i>
                        <span>Click anywhere to explore</span>
                    </div>
                </div>
            </div>
        </div>

        <header>
            <h1 class="logo" id="home-logo">Baflix</h1>
            <div class="social-icons"></div>
        </header>

        <!-- User Info Section -->
        <div id="user-info-section" class="user-info-section">
            <div class="user-info-header">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-welcome-text">

    <!-- Dynamic Details View Container (Zero-loading Back Mode) -->
    <div id="details-view-container">
        <div class="back-header">
            <button class="back-btn" id="details-back-btn"><i class="fas fa-arrow-left"></i></button>

        <div id="details-error-message">
            <i class="fas fa-exclamation-circle"></i>
            <h2>Movie Not Found</h2>
            <p>The movie you're looking for doesn't exist or has been removed.</p>
            <button class="action-btn" style="margin-top: 20px;" id="error-go-home-btn">
                <i class="fas fa-home"></i> Go Home
            </button>
        </div>

        <div class="details-main-container" id="details-main-container">
            <div class="movie-header-details">
                <div class="movie-poster-large">
                    <img id="detail-poster" src="" alt="Poster" onerror="this.src='https://via.placeholder.com/300x450/222/fff?text=No+Image'">

                    <h1 class="movie-title-large" id="detail-title"></h1>
                    <p class="movie-meta" id="detail-genres"></p>

                <div class="video-container">
                    <iframe id="youtube-trailer-iframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, setDoc, increment, serverTimestamp, query, where, orderBy, startAfter, limit, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3okSnZJrF9ooUp12KihKISR2VRZq5Ju8",
            authDomain: "baflix-man.firebaseapp.com",
            projectId: "baflix-man",
            storageBucket: "baflix-man.firebasestorage.app",
            messagingSenderId: "1041860946828",
            appId: "1:1041860946828:web:fa8b976dc07ced6ce704a9",
            measurementId: "G-XDZ9EFWCX5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        document.addEventListener('DOMContentLoaded', () => {
            const homeView = document.getElementById('home-view-container');
            const detailsView = document.getElementById('details-view-container');
            
            const movieGrid = document.querySelector('.movie-grid');
            const skeletonLoader = document.getElementById('skeleton-loader');
            const noMoviesMessage = document.getElementById('no-movies-message');
            const socialIconsContainer = document.querySelector('.social-icons');
            const filterContainer = document.querySelector('.filter-container');
            const searchBar = document.getElementById('search-bar');
            const searchForm = document.getElementById('search-form');
            const sortBySelect = document.getElementById('sort-by');
            const homeLogo = document.getElementById('home-logo');

            const userInfoSection = document.getElementById('user-info-section');
            const welcomeUserName = document.getElementById('welcome-user-name');
            const userTelegramName = document.getElementById('user-telegram-name');
            const userChatId = document.getElementById('user-chat-id');
            const userUsername = document.getElementById('user-username');

            const welcomePopup = document.getElementById('welcome-popup');
            const welcomePopupClose = document.getElementById('welcome-popup-close');
            const welcomePopupTimer = document.getElementById('welcome-popup-timer');
            const welcomePopupImg = document.getElementById('welcome-popup-img');
            const welcomePopupTitle = document.getElementById('welcome-popup-title');
            const welcomePopupDescription = document.getElementById('welcome-popup-description');
            const welcomePopupContent = document.getElementById('welcome-popup-content');

            // Details Elements
            const detailsLoading = document.getElementById('details-loading-indicator');
            const detailsMainContent = document.getElementById('details-main-container');
            const detailsError = document.getElementById('details-error-message');
            const detailsBackBtn = document.getElementById('details-back-btn');
            const detailsLogoText = document.getElementById('details-logo-text');
            const errorGoHomeBtn = document.getElementById('error-go-home-btn');
            const modalOverlay = document.getElementById('trailer-modal');
            const trailerIframe = document.getElementById('youtube-trailer-iframe');
            const trailerCloseBtn = document.getElementById('trailer-close-btn');

            let currentlyLoadedMovies = [];
            let isFetchingMore = false;
            let currentFilter = 'All';
            let currentSort = 'updatedAt_desc';
            let lastVisible = null;
            const MOVIES_PER_PAGE = 20;
            let popupTimer = null;
            let popupTimeLeft = 5;
            let popupLinkUrl = '';
            let hasShownPopup = false;
            let savedScrollPosition = 0;

            document.body.addEventListener('contextmenu', (e) => e.preventDefault());
            
            const parseEpisodeNumber = (epNumStr) => {
                const str = String(epNumStr).trim();
                if (str.includes('-')) {
                    const parts = str.split('-').map(num => parseInt(num.trim(), 10));
                    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                        const [start, end] = parts;
                        const count = Math.abs(end - start) + 1;
                        const highest = Math.max(start, end);
                        return { count, highest };
                    }
                }
                const singleNum = parseInt(str, 10);
                if (!isNaN(singleNum)) return { count: 1, highest: singleNum };
                return { count: 1, highest: 0 };
            };

            const getYoutubeVideoId = (url) => {
                if(!url) return null;
                let videoId = null;
                try {
                    const urlObj = new URL(url);
                    if (urlObj.hostname === 'youtu.be') videoId = urlObj.pathname.slice(1);
                    else if (urlObj.hostname.includes('youtube.com')) videoId = urlObj.searchParams.get('v');
                } catch (e) {
                    const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
                    const match = url.match(regex);
                    if (match) videoId = match[1];
                }
                return videoId;
            };

            const openSafeLink = (url) => {
                const tgApp = window.Telegram?.WebApp;
                if (tgApp && tgApp.initData) {
                    if (url.includes('t.me/')) {
                        try { tgApp.openTelegramLink(url); } catch (e) { tgApp.openLink(url); }
                    } else { tgApp.openLink(url); }
                } else { window.open(url, '_blank'); }
            };

            const incrementDownloadCount = async (movieId) => {
                if (!movieId) return;
                try {
                    await updateDoc(doc(db, 'movies', movieId), { downloadCount: increment(1) });
                } catch (error) { console.error("Error incrementing download count:", error); }
            };

            // Router Engine to handle zero-loading transitions
            const showHomeView = () => {
                detailsView.style.display = 'none';
                homeView.style.display = 'block';
                window.scrollTo(0, savedScrollPosition);
                
                const tgApp = window.Telegram?.WebApp;
                if (tgApp && tgApp.BackButton) {
                    tgApp.BackButton.hide();
                }
            };

            const showDetailsView = async (movieId) => {
                savedScrollPosition = window.pageYOffset || document.documentElement.scrollTop;
                homeView.style.display = 'none';
                detailsView.style.display = 'block';
                window.scrollTo(0, 0);

                detailsMainContent.style.display = 'none';
                detailsError.style.display = 'none';
                detailsLoading.style.display = 'flex';

                const tgApp = window.Telegram?.WebApp;
                if (tgApp && tgApp.BackButton) {
                    tgApp.BackButton.show();
                }

                try {
                    let movieData = currentlyLoadedMovies.find(m => m.id === movieId);
                    if (!movieData) {
                        const docSnap = await getDoc(doc(db, 'movies', movieId));
                        if (docSnap.exists()) {
                            movieData = { id: docSnap.id, ...docSnap.data() };
                        }
                    }

                    if (!movieData || movieData.status !== 'active') {
                        detailsLoading.style.display = 'none';
                        detailsError.style.display = 'block';
                        return;
                    }

                    renderMovieDetails(movieData);
                    detailsLoading.style.display = 'none';
                    detailsMainContent.style.display = 'block';
                } catch (error) {
                    console.error("Error loading movie details:", error);
                    detailsLoading.style.display = 'none';
                    detailsError.style.display = 'block';
                }
            };

            const navigateToDetails = (movieId) => {
                history.pushState({ view: 'details', id: movieId }, '', `?id=${movieId}`);
                showDetailsView(movieId);
            };

            const navigateToHome = () => {
                if (history.state && history.state.view === 'details') {
                    history.back();
                } else {
                    history.pushState({ view: 'home' }, '', window.location.pathname);
                    showHomeView();
                }
            };

            window.addEventListener('popstate', (e) => {
                if (e.state && e.state.view === 'details') {
                    showDetailsView(e.state.id);
                } else {
                    showHomeView();
                }
            });

            const renderMovieDetails = (movie) => {
                document.getElementById('detail-poster').src = movie.posterUrl || 'https://via.placeholder.com/300x450/222/fff?text=No+Image';
                document.getElementById('detail-title').textContent = movie.title || 'Untitled';
                document.getElementById('detail-genres').textContent = movie.genres || 'N/A';
                document.getElementById('detail-rating').innerHTML = `<i class="fas fa-star" style="color:gold;"></i> ${movie.rating || 'N/A'}/10`;
                document.getElementById('detail-year').textContent = `Year: ${movie.year || 'N/A'}`;
                document.getElementById('detail-language').textContent = `Language: ${movie.language || 'N/A'}`;
                document.getElementById('detail-description').textContent = movie.description || 'No description available.';

                const seriesInfoEl = document.getElementById('detail-series-info');
                const isSeries = movie.type !== 'movie';

                if (isSeries && movie.seasons && movie.seasons.length > 0) {
                    const seasonCount = movie.seasons.length;
                    const episodeCount = movie.seasons.reduce((totalAcc, season) => {
                        if (!season.episodes || season.episodes.length === 0) return totalAcc;
                        return totalAcc + season.episodes.reduce((seasonAcc, episode) => {
                            return seasonAcc + parseEpisodeNumber(episode.episode_number).count;
                        }, 0);
                    }, 0);
                    seriesInfoEl.textContent = `Total Seasons: ${seasonCount} | Total Episodes: ${episodeCount}`;
                    seriesInfoEl.style.display = 'block';
                } else {
                    seriesInfoEl.style.display = 'none';
                }

                const trailerContainer = document.getElementById('detail-trailer-container');
                trailerContainer.innerHTML = '';
                if (movie.trailerUrl) {
                    const trailerBtn = document.createElement('button');
                    trailerBtn.className = 'trailer-btn';
                    trailerBtn.innerHTML = `<i class="fas fa-play"></i> Watch Trailer`;
                    trailerBtn.onclick = () => {
                        const videoId = getYoutubeVideoId(movie.trailerUrl);
                        if (videoId) {
                            trailerIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&fs=0&rel=0`;
                            modalOverlay.classList.add('visible');
                        } else {
                            alert("Invalid trailer link provided.");
                        }
                    };
                    trailerContainer.appendChild(trailerBtn);
                }

                const actionsContainer = document.getElementById('detail-actions');
                actionsContainer.innerHTML = '';

                // Generate a reliable share link pointing back via router
                const basePathUrl = window.location.origin + window.location.pathname;
                const shareUrl = `${basePathUrl}?id=${movie.id}`;
                const shareMessage = `🎬 "${movie.title}" Watch now on Baflix!\n\n${shareUrl}`;

                const shareBtn = document.createElement('button');
                shareBtn.className = 'action-btn';
                shareBtn.innerHTML = `<i class="fas fa-share-alt"></i> Share`;
                shareBtn.onclick = () => {
                    const telegramShareUrl = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareMessage)}`;
                    openSafeLink(telegramShareUrl);
                };
                actionsContainer.appendChild(shareBtn);

                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-btn copy';
                copyBtn.innerHTML = `<i class="fas fa-copy"></i> Copy Link`;
                copyBtn.onclick = (e) => copyToClipboard(shareUrl, e.currentTarget);
                actionsContainer.appendChild(copyBtn);

                const downloadsContainer = document.getElementById('detail-downloads');
                downloadsContainer.innerHTML = '';

                if (movie.type === 'movie' && movie.downloadLinks && movie.downloadLinks.length > 0) {
                    const linksWrapper = document.createElement('div');
                    movie.downloadLinks.forEach(link => {
                        const button = document.createElement('button');
                        button.textContent = link.name;
                        button.className = 'download-btn';

                        let currentBtnAdLinks = [];
                        if (link.ads && typeof link.ads === 'string' && link.ads.trim() !== '') {
                            currentBtnAdLinks = link.ads.split(',').map(u => u.trim()).filter(u => u);
                        }
                        let clickCount = 0;

                        button.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();

                            if (currentBtnAdLinks.length > 0 && clickCount < currentBtnAdLinks.length) {
                                openSafeLink(currentBtnAdLinks[clickCount]);
                                clickCount++;
                            } else {
                                incrementDownloadCount(movie.id);
                                if (link.url) openSafeLink(link.url);
                            }
                        });
                        button.addEventListener('contextmenu', (e) => e.preventDefault());
                        linksWrapper.appendChild(button);
                    });
                    downloadsContainer.appendChild(linksWrapper);
                } else if (movie.seasons && movie.seasons.length > 0) {
                    movie.seasons.sort((a, b) => a.season_number - b.season_number).forEach(season => {
                        const seasonAccordion = document.createElement('div');
                        seasonAccordion.className = 'season-accordion';

                        const seasonHeader = document.createElement('div');
                        seasonHeader.className = 'season-accordion-header';
                        seasonHeader.innerHTML = `<h4>Season ${season.season_number}</h4><i class="fas fa-chevron-down"></i>`;

                        const seasonContent = document.createElement('div');
                        seasonContent.className = 'season-accordion-content';

                        if (season.episodes && season.episodes.length > 0) {
                            season.episodes.sort((a, b) => {
                                const highestA = parseEpisodeNumber(a.episode_number).highest;
                                const highestB = parseEpisodeNumber(b.episode_number).highest;
                                return highestA - highestB;
                            }).forEach(episode => {
                                const episodeContainer = document.createElement('div');
                                episodeContainer.className = 'episode-container';

                                const episodeTitle = document.createElement('p');
                                episodeTitle.className = 'episode-title';
                                episodeTitle.textContent = `Episode ${episode.episode_number}` + (episode.title ? `: ${episode.title}` : '');
                                episodeContainer.appendChild(episodeTitle);

                                if (episode.downloadLinks && episode.downloadLinks.length > 0) {
                                    episode.downloadLinks.forEach(link => {
                                        const button = document.createElement('button');
                                        button.textContent = link.name;
                                        button.className = 'download-btn';

                                        let currentBtnAdLinks = [];
                                        if (link.ads && typeof link.ads === 'string' && link.ads.trim() !== '') {
                                            currentBtnAdLinks = link.ads.split(',').map(u => u.trim()).filter(u => u);
                                        }
                                        let clickCount = 0;

                                        button.addEventListener('click', (e) => {
                                            e.preventDefault();
                                            e.stopPropagation();

                                            if (currentBtnAdLinks.length > 0 && clickCount < currentBtnAdLinks.length) {
                                                openSafeLink(currentBtnAdLinks[clickCount]);
                                                clickCount++;
                                            } else {
                                                incrementDownloadCount(movie.id);
                                                if (link.url) openSafeLink(link.url);
                                            }
                                        });
                                        button.addEventListener('contextmenu', (e) => e.preventDefault());
                                        episodeContainer.appendChild(button);
                                    });
                                } else {
                                    const noLinksText = document.createElement('p');
                                    noLinksText.textContent = 'No links for this episode.';
                                    noLinksText.style.cssText = "font-size: 0.8rem; color: #777;";
                                    episodeContainer.appendChild(noLinksText);
                                }
                                seasonContent.appendChild(episodeContainer);
                            });
                        }
                        seasonAccordion.appendChild(seasonHeader);
                        seasonAccordion.appendChild(seasonContent);
                        downloadsContainer.appendChild(seasonAccordion);
                    });
                }
            };

            const fetchAndRenderMovies = async (isInitial = false) => {
                if (isFetchingMore) return;
                isFetchingMore = true;

                if (isInitial) {
                    movieGrid.innerHTML = '';
                    lastVisible = null;
                    currentlyLoadedMovies = [];
                    movieGrid.style.display = 'none';
                    noMoviesMessage.style.display = 'none';
                    skeletonLoader.style.display = 'grid';
                    movieGrid.classList.remove('list-view');
                }

                try {
                    const [sortField, sortDirection] = currentSort.split('_');
                    const moviesCollection = collection(db, 'movies');
                    
                    let queryConstraints = [];
                    if (currentFilter !== 'All') {
                        queryConstraints.push(where('categories', 'array-contains', currentFilter));
                    }
                    queryConstraints.push(orderBy(sortField, sortDirection));
                    if (!isInitial && lastVisible) {
                        queryConstraints.push(startAfter(lastVisible));
                    }
                    queryConstraints.push(limit(MOVIES_PER_PAGE));

                    const q = query(moviesCollection, ...queryConstraints);
                    const snapshot = await getDocs(q);

                    skeletonLoader.style.display = 'none';

                    if (snapshot.empty) {
                        if (isInitial) {
                            let message = `This section is empty.`;
                            if (currentFilter !== 'All') {
                                message = `No movie or series found for "${currentFilter}".`;
                            }
                            noMoviesMessage.querySelector('p').textContent = message;
                            noMoviesMessage.style.display = 'block';
                            movieGrid.style.display = 'none';
                        }
                        lastVisible = null; 
                    } else {
                        movieGrid.style.display = 'grid';
                        lastVisible = snapshot.docs[snapshot.docs.length - 1];
                        const newMovies = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        currentlyLoadedMovies.push(...newMovies);
                        appendMovies(newMovies.filter(m => m.status === 'active'));
                    }
                } catch (error) {
                    console.error("Error fetching movies:", error);
                    skeletonLoader.style.display = 'none';
                    noMoviesMessage.innerHTML = `<p>Could not load data. Please check your internet connection.</p>`;
                    noMoviesMessage.style.display = 'block';
                } finally {
                    isFetchingMore = false;
                }
            };
            
            const performSearch = async () => {
                const searchTerm = searchBar.value.trim();
                if (!searchTerm) {
                    movieGrid.classList.remove('list-view');
                    fetchAndRenderMovies(true);
                    return;
                }
                
                const searchTermLower = searchTerm.toLowerCase();
                movieGrid.innerHTML = '';
                movieGrid.style.display = 'none';
                noMoviesMessage.style.display = 'none';
                skeletonLoader.style.display = 'grid';

                try {
                    const moviesCollection = collection(db, 'movies');
                    const q = query(moviesCollection, where('status', '==', 'active'));
                    const snapshot = await getDocs(q);
                    skeletonLoader.style.display = 'none';
                    
                    const filteredMovies = snapshot.docs
                        .map(doc => ({ id: doc.id, ...doc.data() }))
                        .filter(movie => movie.title && movie.title.toLowerCase().includes(searchTermLower));
                    
                    currentlyLoadedMovies = filteredMovies;
                    movieGrid.classList.add('list-view');
                    renderMovies(filteredMovies.slice(0, 50));

                    if (filteredMovies.length === 0) {
                        noMoviesMessage.querySelector('p').textContent = `"${searchTerm}" এর জন্য কোনো কন্টেন্ট পাওয়া যায়নি।`;
                        noMoviesMessage.style.display = 'block';
                    }
                } catch (error) {
                    console.error("Error fetching movies for search:", error);
                    skeletonLoader.style.display = 'none';
                    noMoviesMessage.innerHTML = `<p>সার্চ করতে একটি সমস্যা হয়েছে।</p>`;
                    noMoviesMessage.style.display = 'block';
                }
            };
            
            const appendMovies = (moviesToAppend) => {
                const fragment = document.createDocumentFragment();
                const isListView = movieGrid.classList.contains('list-view');

                moviesToAppend.forEach(movie => {
                    const movieCard = document.createElement('div');
                    movieCard.className = 'movie-card';
                    movieCard.dataset.movieId = movie.id;

                    const isSeries = movie.type !== 'movie';
                    let seriesInfoHTML = '';
                    
                    if (isSeries && movie.seasons && movie.seasons.length > 0) {
                        const sortedSeasons = [...movie.seasons].sort((a, b) => b.season_number - a.season_number);
                        const latestSeason = sortedSeasons[0];
                        if (latestSeason && latestSeason.episodes && latestSeason.episodes.length > 0) {
                            const sortedEpisodes = [...latestSeason.episodes].sort((a, b) => {
                                const highestA = parseEpisodeNumber(a.episode_number).highest;
                                const highestB = parseEpisodeNumber(b.episode_number).highest;
                                return highestB - highestA;
                            });
                            const latestEpisode = sortedEpisodes[0];
                            if (latestEpisode) {
                                const latestEpisodeInfo = parseEpisodeNumber(latestEpisode.episode_number);
                                seriesInfoHTML = `<p class="movie-series-info">S${latestSeason.season_number} | E${latestEpisodeInfo.highest}</p>`;
                            }
                        }
                    }

                    let cardHTML = '';
                    let languageBadgeHTML = movie.language ? `<div class="language-badge">${movie.language}</div>` : '';
                    let uploadDateHTML = '';
                    if (movie.createdAt && typeof movie.createdAt.toDate === 'function') {
                        const uploadDate = movie.createdAt.toDate();
                        const formattedDate = uploadDate.toLocaleDateString('en-GB');
                        uploadDateHTML = `<div class="upload-date-badge">${formattedDate}</div>`;
                    }

                    if (isListView) {
                        cardHTML = `
                            <div class="movie-poster">
                                ${uploadDateHTML}${languageBadgeHTML}
                                <img src="${movie.posterUrl}" alt="${movie.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/222/fff?text=Error'">
                            </div>
                            <div class="movie-info">
                                <h3 class="movie-title">${movie.title}</h3>
                                <p class="movie-description-snippet">${movie.description || 'No description available.'}</p>
                                <p class="movie-genres"><b>Genres:</b> ${movie.genres || 'N/A'}</p>
                                ${seriesInfoHTML}
                                <p class="movie-rating"><i class="fas fa-star" style="color:gold;"></i> ${movie.rating || 'N/A'}/10</p>
                                <p class="movie-year"><b>Year:</b> ${movie.year || 'N/A'}</p>
                            </div>`;
                    } else {
                        cardHTML = `
                            <div class="movie-poster">
                                ${uploadDateHTML}${languageBadgeHTML}
                                <img src="${movie.posterUrl}" alt="${movie.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/222/fff?text=Error'">
                            </div>
                            <div class="movie-info">
                                <h3 class="movie-title">${movie.title}</h3>
                                <p class="movie-genres">${movie.genres || ''}</p>
                                ${seriesInfoHTML}
                                <p class="movie-rating"><i class="fas fa-star" style="color:gold;"></i> ${movie.rating || 'N/A'}/10</p>
                                <p class="movie-year">${movie.year || 'N/A'}</p>
                            </div>`;
                    }
                    movieCard.innerHTML = cardHTML;
                    fragment.appendChild(movieCard);
                });
                movieGrid.appendChild(fragment);
            };

            const renderMovies = (moviesToRender) => {
                movieGrid.innerHTML = '';
                const activeMovies = moviesToRender.filter(movie => movie.status === 'active');
                if (activeMovies.length === 0) {
                    noMoviesMessage.querySelector('p').textContent = "The content you are looking for is not available.";
                    noMoviesMessage.style.display = 'block';
                    movieGrid.style.display = 'none';
                } else {
                    noMoviesMessage.style.display = 'none';
                    movieGrid.style.display = movieGrid.classList.contains('list-view') ? 'block' : 'grid';
                    appendMovies(activeMovies);
                }
            };

            const renderSocialLinks = async () => {
                try {
                    const q = query(collection(db, 'socialLinks'));
                    const snapshot = await getDocs(q);
                    socialIconsContainer.innerHTML = snapshot.docs.map(doc => `<a href="${doc.data().url}" target="_blank"><img src="${doc.data().imageUrl}" alt="Social Icon"></a>`).join('');
                } catch (error) { console.error("Error setting up social links:", error); }
            };

            const setupFilters = async () => {
                try {
                    const q = query(collection(db, 'filters'), orderBy('name'));
                    const filtersSnapshot = await getDocs(q);
                    const filters = filtersSnapshot.docs.map(doc => doc.data().name);
                    filterContainer.innerHTML = '';
                    const allFilter = document.createElement('div');
                    allFilter.className = 'filter active';
                    allFilter.textContent = 'All';
                    allFilter.dataset.filter = 'All';
                    filterContainer.appendChild(allFilter);
                    filters.forEach(name => {
                        const filterEl = document.createElement('div');
                        filterEl.className = 'filter';
                        filterEl.textContent = name;
                        filterEl.dataset.filter = name;
                        filterContainer.appendChild(filterEl);
                    });
                } catch (error) { console.error("Error setting up filters:", error); }
            };

            const loadWelcomePopupSettings = async () => {
                try {
                    const popupDoc = await getDoc(doc(db, 'settings', 'welcomePopup'));
                    if (popupDoc.exists()) {
                        const data = popupDoc.data();
                        if (data.enabled && !hasShownPopup) {
                            welcomePopupImg.src = data.imageUrl || '';
                            welcomePopupTitle.textContent = data.title || 'Welcome to Baflix!';
                            welcomePopupDescription.textContent = data.description || 'Enjoy unlimited streaming of movies and series.';
                            popupLinkUrl = data.linkUrl || '';
                            showWelcomePopup();
                            hasShownPopup = true;
                        }
                    }
                } catch (error) {
                    console.error("Error loading welcome popup settings:", error);
                }
            };

            const showWelcomePopup = () => {
                welcomePopup.classList.add('visible');
                popupTimeLeft = 5;
                welcomePopupTimer.textContent = `${popupTimeLeft}s`;
                welcomePopupClose.classList.remove('visible');
                if (popupTimer) clearInterval(popupTimer);
                popupTimer = setInterval(() => {
                    popupTimeLeft--;
                    welcomePopupTimer.textContent = `${popupTimeLeft}s`;
                    if (popupTimeLeft <= 0) {
                        clearInterval(popupTimer);
                        welcomePopupClose.classList.add('visible');
                        welcomePopupTimer.style.display = 'none';
                    }
                }, 1000);
            };

            const closeWelcomePopup = () => {
                welcomePopup.classList.remove('visible');
                if (popupTimer) clearInterval(popupTimer);
                welcomePopupTimer.style.display = 'block';
            };

            welcomePopupClose.addEventListener('click', (e) => {
                e.stopPropagation();
                closeWelcomePopup();
            });
            welcomePopupContent.addEventListener('click', () => {
                if (popupLinkUrl) openSafeLink(popupLinkUrl);
                closeWelcomePopup();
            });

            const copyToClipboard = (text, button) => {
                const originalText = button.innerHTML;
                const showSuccess = () => {
                    button.innerHTML = `<i class="fas fa-check"></i> Copied!`;
                    setTimeout(() => { button.innerHTML = originalText; }, 2000);
                };
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(showSuccess).catch(() => fallbackCopy(text, button, originalText));
                } else {
                    fallbackCopy(text, button, originalText);
                }
            };
            const fallbackCopy = (text, button, originalText) => {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.top = '-9999px';
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        button.innerHTML = `<i class="fas fa-check"></i> Copied!`;
                        setTimeout(() => { button.innerHTML = originalText; }, 2000);
                    }
                } catch (err) { console.error("Error during fallback copy:", err); }
                document.body.removeChild(textArea);
            };

            let tg = null;
            const saveOrUpdateTelegramUser = async (user) => {
                if (!user || !user.id) return;
                const userDocRef = doc(db, "telegramUsers", String(user.id));
                try {
                    const docSnap = await getDoc(userDocRef);
                    const now = new Date();
                    const userData = {
                        id: user.id,
                        firstName: user.first_name || '',
                        lastName: user.last_name || '',
                        username: user.username || '',
                        lastSeen: serverTimestamp(),
                        lastActive: serverTimestamp(),
                        lastVisit: now.toISOString(),
                        visitCount: increment(1)
                    };
                    if (docSnap.exists()) {
                        await updateDoc(userDocRef, userData);
                        const currentVisits = (docSnap.data().visitCount || 0) + 1;
                        if (currentVisits % 5 === 0 && !localStorage.getItem('userInfoShown')) {
                            setTimeout(() => userInfoSection.classList.add('visible'), 1000);
                        }
                    } else {
                        userData.createdAt = serverTimestamp();
                        userData.status = 'active';
                        userData.visitCount = 1;
                        userData.firstVisit = now.toISOString();
                        await setDoc(userDocRef, userData);
                        setTimeout(() => {
                            if (!localStorage.getItem('userInfoShown')) {
                                userInfoSection.classList.add('visible');
                            }
                        }, 1000);
                    }
                    const fullName = user.first_name + (user.last_name ? ' ' + user.last_name : '');
                    if (welcomeUserName) welcomeUserName.textContent = `Welcome, ${fullName}!`;
                    if (userTelegramName) userTelegramName.textContent = fullName;
                    if (userChatId) userChatId.textContent = user.id;
                    if (userUsername) userUsername.textContent = user.username ? '@' + user.username : 'No username';
                } catch (error) { console.error("Error saving or updating user data:", error); }
            };
            
            const logVisit = async (user) => {
                try {
                    await addDoc(collection(db, "visits"), {
                        timestamp: serverTimestamp(),
                        userId: user ? String(user.id) : 'anonymous',
                        userAgent: navigator.userAgent,
                        platform: navigator.platform,
                        language: navigator.language
                    });
                } catch (error) { console.error("Failed to log visit:", error); }
            };

            const initializeApp = async (tgInstance) => {
                console.log("Initializing app...");
                if (tgInstance) {
                    tg = tgInstance;
                    tg.expand();
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        await saveOrUpdateTelegramUser(tg.initDataUnsafe.user);
                        await logVisit(tg.initDataUnsafe.user);
                    } else {
                        await logVisit(null);
                    }
                    
                    if (tg.BackButton) {
                        tg.BackButton.onClick(navigateToHome);
                    }
                } else {
                    await logVisit(null);
                }
                await Promise.all([renderSocialLinks(), setupFilters()]);
                await loadWelcomePopupSettings();
                
                // Deep link support checking router query parameter
                const urlParams = new URLSearchParams(window.location.search);
                const queryId = urlParams.get('id');
                
                await fetchAndRenderMovies(true);

                if (queryId) {
                    history.replaceState({ view: 'details', id: queryId }, '', `?id=${queryId}`);
                    showDetailsView(queryId);
                } else {
                    history.replaceState({ view: 'home' }, '', window.location.pathname);
                }
                console.log("App initialization complete");
            };

            // Event Listeners
            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                performSearch();
                searchBar.blur();
            });

            searchBar.addEventListener('input', () => {
                if (searchBar.value.trim() === '') {
                    movieGrid.classList.remove('list-view');
                    fetchAndRenderMovies(true);
                }
            });

            filterContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter')) {
                    const newFilter = e.target.dataset.filter;
                    if (newFilter === currentFilter) return;
                    currentFilter = newFilter;
                    searchBar.value = '';
                    document.querySelector('.filter.active').classList.remove('active');
                    e.target.classList.add('active');
                    fetchAndRenderMovies(true);
                }
            });

            sortBySelect.addEventListener('change', (e) => {
                currentSort = e.target.value;
                fetchAndRenderMovies(true);
            });

            movieGrid.addEventListener('click', (e) => {
                const card = e.target.closest('.movie-card');
                if (card && card.dataset.movieId) {
                    navigateToDetails(card.dataset.movieId);
                }
            });

            homeLogo.addEventListener('click', () => {
                searchBar.value = '';
                currentFilter = 'All';
                currentSort = 'updatedAt_desc';
                sortBySelect.value = 'updatedAt_desc';
                const activeFilter = filterContainer.querySelector('.filter.active');
                if (activeFilter) activeFilter.classList.remove('active');
                const defaultFilter = filterContainer.querySelector('[data-filter="All"]');
                if (defaultFilter) defaultFilter.classList.add('active');
                fetchAndRenderMovies(true);
            });

            window.addEventListener('scroll', () => {
                if (homeView.style.display === 'none' || movieGrid.classList.contains('list-view') || isFetchingMore || !lastVisible) return;
                const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
                if (clientHeight + scrollTop >= scrollHeight - 300) {
                    fetchAndRenderMovies(false);
                }
            });

            document.getElementById('close-user-info-btn').addEventListener('click', () => {
                userInfoSection.classList.remove('visible');
                localStorage.setItem('userInfoShown', 'true');
            });

            document.getElementById('copy-tg-name-btn').addEventListener('click', (e) => {
                copyToClipboard(userTelegramName.textContent, e.currentTarget);
            });

            document.getElementById('copy-chat-id-btn').addEventListener('click', (e) => {
                copyToClipboard(userChatId.textContent, e.currentTarget);
            });

            // Details View Button Bindings
            detailsBackBtn.addEventListener('click', navigateToHome);
            detailsLogoText.addEventListener('click', navigateToHome);
            errorGoHomeBtn.addEventListener('click', navigateToHome);

            trailerCloseBtn.addEventListener('click', () => {
                modalOverlay.classList.remove('visible');
                trailerIframe.src = '';
            });

            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('visible');
                    trailerIframe.src = '';
                }
            });

            document.getElementById('details-downloads').addEventListener('click', function(e) {
                const header = e.target.closest('.season-accordion-header');
                if (header) {
                    const accordion = header.parentElement;
                    accordion.classList.toggle('active');
                }
            });

            const handleConnectionChange = () => {
                if (!navigator.onLine) {
                    skeletonLoader.style.display = 'none';
                    noMoviesMessage.innerHTML = `<p>You are offline. Please check your internet connection.</p>`;
                    noMoviesMessage.style.display = 'block';
                }
            };
            
            window.addEventListener('online', () => {
                if(homeView.style.display !== 'none') {
                    fetchAndRenderMovies(true);
                }
            });
            window.addEventListener('offline', handleConnectionChange);
            
            try {
                if (!navigator.onLine) {
                    handleConnectionChange();
                    return;
                }
                const webApp = window.Telegram?.WebApp;
                if (webApp && webApp.initData) {
                    initializeApp(webApp);
                } else {
                    initializeApp(null);
                }
            } catch (error) {
                console.error('An error occurred during initialization:', error);
                initializeApp(null);
            }
        });
    </script>
</body>
</html>
