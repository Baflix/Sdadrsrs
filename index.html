<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baflix - Premium Streaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- polyfill.io সরানো হয়েছে - সমস্যা সৃষ্টি করছে -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #e50914; --secondary: #b81d24; --dark: #141414; --light-dark: #222; --text: #fff; --text-secondary: #aaa; --green: #28a745; --dark-green: #218838; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        header { padding: 20px; text-align: center; }
        .logo {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #e50914, #f5f5f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-animation: flicker 1.5s infinite alternate;
            animation: flicker 1.5s infinite alternate;
            margin-bottom: 15px;
            cursor: pointer;
        }
        @-webkit-keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 40px var(--primary), 0 0 80px var(--primary); } 20%, 24%, 55% { text-shadow: none; } }
        @keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 40px var(--primary), 0 0 80px var(--primary); } 20%, 24%, 55% { text-shadow: none; } }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .social-icons a { display: inline-block; transition: transform 0.3s; }
        .social-icons img { width: 28px; height: 28px; object-fit: contain; filter: grayscale(1); transition: filter 0.3s; }
        .social-icons a:hover img { filter: grayscale(0); }

        .search-container-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto 20px;
            padding: 20px 20px 0;
        }
        .search-container {
            display: flex;
            flex-grow: 1;
        }
        #search-form {
            display: flex;
            width: 100%;
        }
        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 25px 0 0 25px;
            background: var(--light-dark);
            color: var(--text);
            font-size: 1rem;
        }
        .search-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 0 25px 25px 0;
            background: var(--primary);
            color: var(--text);
            cursor: pointer;
        }

        .controls-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 0 20px;
            flex-wrap: wrap;
        }

        #sort-by {
            padding: 8px 15px;
            border-radius: 20px;
            background: var(--light-dark);
            color: var(--text);
            border: 1px solid #444;
            cursor: pointer;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%20fill='%23aaa'%3E%3Cpath%20d='M7%2010l5%205%205-5z'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1.2em;
            padding-right: 30px;
        }
        
        .filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .filter { padding: 8px 15px; border-radius: 20px; background: var(--light-dark); color: var(--text); cursor: pointer; transition: background 0.3s, transform 0.2s; }
        .filter.active { background: var(--primary); font-weight: bold; }

        .user-info-section {
            background: linear-gradient(145deg, #1a1a1a, #222);
            border-radius: 15px;
            padding: 20px;
            margin: 0 20px 25px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 5px 20px rgba(229, 9, 20, 0.2);
            display: none;
        }
        .user-info-section.visible {
            display: block;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-info-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
        }
        .user-welcome-text h3 { color: var(--primary); margin-bottom: 5px; font-size: 1.3rem; }
        .user-welcome-text p { color: var(--text-secondary); font-size: 0.9rem; }
        .user-details { display: flex; flex-direction: column; gap: 15px; }
        .user-detail-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid #333;
        }
        .detail-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .detail-content { flex: 1; }
        .detail-label { color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 3px; }
        .detail-value { color: #fff; font-weight: bold; font-size: 1.1rem; word-break: break-word; }
        .detail-value.small { font-size: 0.9rem; color: var(--text-secondary); }
        .copy-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px 10px;
            transition: all 0.3s ease;
        }
        .copy-btn:hover { transform: scale(1.1); }
        .user-info-close {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        .close-user-info {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .close-user-info:hover { background: var(--secondary); transform: translateY(-2px); }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 0 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-card {
            background: var(--light-dark);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .movie-poster { width: 100%; aspect-ratio: 2 / 3; background-color: #333; overflow: hidden; position: relative; }
        .movie-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .movie-info { padding: 10px; }
        .movie-title { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
        .movie-series-info, .movie-genres, .movie-rating, .movie-year {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .movie-series-info { font-weight: bold; color: var(--green); }
        .language-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 1;
        }
        .upload-date-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: rgba(229, 9, 20, 0.8);
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 1;
        }

        .movie-grid.list-view { display: block; max-width: 800px; }
        .movie-grid.list-view .movie-card { display: flex; gap: 15px; background-color: transparent; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 20px; border-radius: 0; overflow: visible; }
        .movie-grid.list-view .movie-card:last-child { border-bottom: none; }
        .movie-grid.list-view .movie-poster { flex: 0 0 100px; height: 150px; aspect-ratio: auto; position: relative; border-radius: 5px; }
        .movie-grid.list-view .movie-info { padding: 0; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        .movie-grid.list-view .movie-title { font-size: 1.1rem; white-space: normal; }
        .movie-grid.list-view .movie-description-snippet {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            overflow-wrap: break-word;
        }

        #skeleton-loader {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 0 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .skeleton-card { background-color: var(--light-dark); border-radius: 8px; }
        .skeleton-poster { width: 100%; aspect-ratio: 2/3; background-color: #333; }
        .skeleton-info { padding: 10px; }
        .skeleton-line { height: 12px; background-color: #333; border-radius: 4px; margin-bottom: 8px; }
        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); -webkit-animation: shimmer 1.5s infinite; animation: shimmer 1.5s infinite; }
        @-webkit-keyframes shimmer { 100% { left: 100%; } }
        @keyframes shimmer { 100% { left: 100%; } }

        .welcome-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .welcome-popup-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        .welcome-popup-content {
            background: linear-gradient(145deg, #1a1a1a, #222);
            width: 90%;
            max-width: 380px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(229, 9, 20, 0.3);
            transform: scale(0.8) translateY(20px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(229, 9, 20, 0.3);
            position: relative;
        }
        .welcome-popup-overlay.visible .welcome-popup-content {
            transform: scale(1) translateY(0);
        }
        .welcome-popup-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 2002;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
        }
        .welcome-popup-close.visible { opacity: 1; }
        .welcome-popup-close:hover {
            background: var(--primary);
            transform: rotate(90deg);
        }
        .welcome-popup-timer {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--primary);
            color: #fff;
            font-weight: bold;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 2002;
            box-shadow: 0 2px 10px rgba(229, 9, 20, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .welcome-popup-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .welcome-popup-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
        }
        .welcome-popup-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .welcome-popup-image:hover img { transform: scale(1.1); }
        .welcome-popup-text {
            padding: 25px 20px 30px;
            text-align: center;
            cursor: pointer;
        }
        .welcome-popup-text h2 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(229, 9, 20, 0.3);
        }
        .welcome-popup-text p {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 1rem;
        }
        .welcome-popup-click-hint {
            margin-top: 15px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(229, 9, 20, 0.1);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px dashed rgba(229, 9, 20, 0.3);
        }
        .welcome-popup-click-hint i { color: var(--primary); }

        /* Cache status indicator - small badge */
        .cache-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.6rem;
            z-index: 999;
            pointer-events: none;
            opacity: 0.5;
        }

        @media (min-width: 600px) { .modal-content { width: 80%; } }
    </style>
</head>
<body>
    <!-- Cache Status Indicator -->
    <div class="cache-status" id="cache-status">⚡ Cache: Off</div>

    <!-- Welcome Popup -->
    <div id="welcome-popup" class="welcome-popup-overlay">
        <div class="welcome-popup-content" id="welcome-popup-content">
            <button class="welcome-popup-close" id="welcome-popup-close">&times;</button>
            <div class="welcome-popup-timer" id="welcome-popup-timer">5s</div>
            <div class="welcome-popup-image" id="welcome-popup-image">
                <img src="" alt="Welcome" id="welcome-popup-img">
            </div>
            <div class="welcome-popup-text" id="welcome-popup-text">
                <h2 id="welcome-popup-title"></h2>
                <p id="welcome-popup-description"></p>
                <div class="welcome-popup-click-hint">
                    <i class="fas fa-mouse-pointer"></i>
                    <span>Click anywhere to explore</span>
                </div>
            </div>
        </div>
    </div>

    <header>
        <h1 class="logo" id="home-logo">Baflix</h1>
        <div class="social-icons"></div>
    </header>

    <!-- User Info Section -->
    <div id="user-info-section" class="user-info-section">
        <div class="user-info-header">
            <div class="user-avatar"><i class="fas fa-user"></i></div>
            <div class="user-welcome-text">
                <h3 id="welcome-user-name"></h3>
                <p>Welcome to Baflix!</p>
            </div>
        </div>
        <div class="user-details">
            <div class="user-detail-item">
                <div class="detail-icon"><i class="fas fa-user-circle"></i></div>
                <div class="detail-content">
                    <div class="detail-label">Telegram Name</div>
                    <div class="detail-value" id="user-telegram-name"></div>
                </div>
                <button class="copy-btn" onclick="copyToClipboard('user-telegram-name')">
                    <i class="far fa-copy"></i>
                </button>
            </div>
            <div class="user-detail-item">
                <div class="detail-icon"><i class="fas fa-id-card"></i></div>
                <div class="detail-content">
                    <div class="detail-label">Chat ID</div>
                    <div class="detail-value" id="user-chat-id"></div>
                </div>
                <button class="copy-btn" onclick="copyToClipboard('user-chat-id')">
                    <i class="far fa-copy"></i>
                </button>
            </div>
            <div class="user-detail-item">
                <div class="detail-icon"><i class="fas fa-at"></i></div>
                <div class="detail-content">
                    <div class="detail-label">Username</div>
                    <div class="detail-value small" id="user-username"></div>
                </div>
            </div>
        </div>
        <div class="user-info-close">
            <button class="close-user-info" onclick="closeUserInfo()">
                <i class="fas fa-check"></i> Got it!
            </button>
        </div>
    </div>

    <div class="search-container-wrapper">
        <div class="search-container">
            <form id="search-form">
                <input type="search" id="search-bar" class="search-bar" placeholder="Search by title..." enterkeyhint="search" autocapitalize="none">
                <button type="submit" id="search-btn" class="search-btn"><i class="fas fa-search"></i></button>
            </form>
        </div>
    </div>

    <div class="controls-container">
        <select id="sort-by">
            <option value="updatedAt_desc">Latest</option>
            <option value="createdAt_asc">Oldest</option>
            <option value="rating_desc">Top Rated</option>
            <option value="rating_asc">Lowest Rated</option>
        </select>
        <div class="filter-container"></div>
    </div>

    <main>
        <div class="movie-grid" style="display: none;"></div>
        <div id="skeleton-loader">
            <script>
                let skeletonHTML = '';
                for (let i = 0; i < 12; i++) {
                    skeletonHTML += `<div class="skeleton-card shimmer"><div class="skeleton-poster"></div><div class="skeleton-info"><div class="skeleton-line"></div></div></div>`;
                }
                document.getElementById('skeleton-loader').innerHTML = skeletonHTML;
            </script>
        </div>
    </main>

    <div id="no-movies-message" style="text-align: center; color: var(--text-secondary); margin-top: 50px; display: none;">
        <p>No content found. Please add content from the admin panel.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, setDoc, increment, serverTimestamp, query, where, orderBy, startAfter, limit, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3okSnZJrF9ooUp12KihKISR2VRZq5Ju8",
            authDomain: "baflix-man.firebaseapp.com",
            projectId: "baflix-man",
            storageBucket: "baflix-man.firebasestorage.app",
            messagingSenderId: "1041860946828",
            appId: "1:1041860946828:web:fa8b976dc07ced6ce704a9",
            measurementId: "G-XDZ9EFWCX5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        document.addEventListener('DOMContentLoaded', () => {
            const movieGrid = document.querySelector('.movie-grid');
            const skeletonLoader = document.getElementById('skeleton-loader');
            const noMoviesMessage = document.getElementById('no-movies-message');
            const socialIconsContainer = document.querySelector('.social-icons');
            const filterContainer = document.querySelector('.filter-container');
            const searchBar = document.getElementById('search-bar');
            const searchForm = document.getElementById('search-form');
            const sortBySelect = document.getElementById('sort-by');
            const homeLogo = document.getElementById('home-logo');
            const cacheStatus = document.getElementById('cache-status');

            const userInfoSection = document.getElementById('user-info-section');
            const welcomeUserName = document.getElementById('welcome-user-name');
            const userTelegramName = document.getElementById('user-telegram-name');
            const userChatId = document.getElementById('user-chat-id');
            const userUsername = document.getElementById('user-username');

            const welcomePopup = document.getElementById('welcome-popup');
            const welcomePopupClose = document.getElementById('welcome-popup-close');
            const welcomePopupTimer = document.getElementById('welcome-popup-timer');
            const welcomePopupImg = document.getElementById('welcome-popup-img');
            const welcomePopupTitle = document.getElementById('welcome-popup-title');
            const welcomePopupDescription = document.getElementById('welcome-popup-description');
            const welcomePopupContent = document.getElementById('welcome-popup-content');

            let currentlyLoadedMovies = [];
            let isFetchingMore = false;
            let currentFilter = 'All';
            let currentSort = 'updatedAt_desc';
            let lastVisible = null;
            const MOVIES_PER_PAGE = 20;
            let popupTimer = null;
            let popupTimeLeft = 5;
            let popupLinkUrl = '';
            let hasShownPopup = false;
            
            // ===== CACHE MANAGEMENT =====
            const CACHE_KEY = 'baflix_movies_cache_data';
            const CACHE_TIMESTAMP_KEY = 'baflix_cache_timestamp';
            const CACHE_FILTER_KEY = 'baflix_cache_filter';
            const CACHE_SORT_KEY = 'baflix_cache_sort';
            const CACHE_DURATION = 10 * 60 * 1000; // 10 minutes cache

            // Check if this is a back/forward navigation
            const isBackForwardNavigation = () => {
                try {
                    if (window.performance && window.performance.navigation) {
                        return window.performance.navigation.type === 2;
                    }
                    if (window.performance && window.performance.getEntriesByType) {
                        const navEntries = window.performance.getEntriesByType('navigation');
                        if (navEntries.length > 0) {
                            return navEntries[0].type === 'back_forward';
                        }
                    }
                } catch (e) {}
                return false;
            };

            // Check if page is loaded from bfcache (back/forward cache)
            const isFromBFCache = () => {
                try {
                    return window.performance && 
                           window.performance.navigation && 
                           window.performance.navigation.type === 2;
                } catch (e) {
                    return false;
                }
            };

            // Load cached movies if available and not expired
            const loadCachedMovies = () => {
                try {
                    const cached = sessionStorage.getItem(CACHE_KEY);
                    const timestamp = sessionStorage.getItem(CACHE_TIMESTAMP_KEY);
                    const cachedFilter = sessionStorage.getItem(CACHE_FILTER_KEY);
                    const cachedSort = sessionStorage.getItem(CACHE_SORT_KEY);
                    
                    // Check if cache matches current filter/sort
                    if (cached && timestamp && cachedFilter === currentFilter && cachedSort === currentSort) {
                        const cacheTime = parseInt(timestamp);
                        if (Date.now() - cacheTime < CACHE_DURATION) {
                            const data = JSON.parse(cached);
                            console.log('✅ Loaded movies from cache:', data.length, 'movies');
                            cacheStatus.textContent = `⚡ Cache: ${data.length} movies`;
                            cacheStatus.style.opacity = '1';
                            setTimeout(() => { cacheStatus.style.opacity = '0.5'; }, 3000);
                            return data;
                        } else {
                            console.log('⏰ Cache expired');
                        }
                    }
                } catch (e) {
                    console.error('Error loading cache:', e);
                }
                return null;
            };

            // Save movies to cache
            const saveMoviesToCache = (movies) => {
                try {
                    sessionStorage.setItem(CACHE_KEY, JSON.stringify(movies));
                    sessionStorage.setItem(CACHE_TIMESTAMP_KEY, String(Date.now()));
                    sessionStorage.setItem(CACHE_FILTER_KEY, currentFilter);
                    sessionStorage.setItem(CACHE_SORT_KEY, currentSort);
                    console.log('💾 Movies saved to cache:', movies.length, 'movies');
                    cacheStatus.textContent = `⚡ Cache: ${movies.length} movies`;
                    cacheStatus.style.opacity = '1';
                    setTimeout(() => { cacheStatus.style.opacity = '0.5'; }, 3000);
                } catch (e) {
                    console.error('Error saving cache:', e);
                }
            };

            // Clear cache
            const clearCache = () => {
                sessionStorage.removeItem(CACHE_KEY);
                sessionStorage.removeItem(CACHE_TIMESTAMP_KEY);
                sessionStorage.removeItem(CACHE_FILTER_KEY);
                sessionStorage.removeItem(CACHE_SORT_KEY);
                console.log('🗑️ Cache cleared');
                cacheStatus.textContent = '⚡ Cache: Off';
            };

            document.body.addEventListener('contextmenu', (e) => e.preventDefault());
            
            const parseEpisodeNumber = (epNumStr) => {
                const str = String(epNumStr).trim();
                if (str.includes('-')) {
                    const parts = str.split('-').map(num => parseInt(num.trim(), 10));
                    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                        const [start, end] = parts;
                        const count = Math.abs(end - start) + 1;
                        const highest = Math.max(start, end);
                        return { count, highest };
                    }
                }
                const singleNum = parseInt(str, 10);
                if (!isNaN(singleNum)) return { count: 1, highest: singleNum };
                return { count: 1, highest: 0 };
            };

            const openSafeLink = (url) => {
                const tgApp = window.Telegram?.WebApp;
                if (tgApp && tgApp.initData) {
                    if (url.includes('t.me/')) {
                        try { tgApp.openTelegramLink(url); } catch (e) { tgApp.openLink(url); }
                    } else { tgApp.openLink(url); }
                } else { window.open(url, '_blank'); }
            };

            // ========== মুভি ডিটেইলস ওপেন করার ফাংশন ==========
            const openMovieDetails = (movieId) => {
                // বর্তমান URL থেকে পাথ বের করা
                const currentPath = window.location.pathname;
                const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
                
                // ডিটেইলস পেজের URL তৈরি করা (movieId সহ)
                const detailsUrl = `${basePath}details.html?id=${movieId}`;
                
                console.log('📺 Opening details URL:', detailsUrl);
                
                const tgApp = window.Telegram?.WebApp;
                if (tgApp && tgApp.initData) {
                    try {
                        tgApp.openLink(detailsUrl);
                    } catch (e) {
                        window.open(detailsUrl, '_blank');
                    }
                } else {
                    // ব্রাউজারে - সরাসরি নেভিগেট
                    window.location.href = detailsUrl;
                }
            };

            const fetchAndRenderMovies = async (isInitial = false, useCache = true) => {
                if (isFetchingMore) return;
                isFetchingMore = true;

                if (isInitial) {
                    movieGrid.innerHTML = '';
                    lastVisible = null;
                    currentlyLoadedMovies = [];
                    movieGrid.style.display = 'none';
                    noMoviesMessage.style.display = 'none';
                    skeletonLoader.style.display = 'grid';
                    movieGrid.classList.remove('list-view');
                }

                // ===== CHECK CACHE FOR INITIAL LOAD =====
                if (isInitial && useCache) {
                    const cachedMovies = loadCachedMovies();
                    if (cachedMovies && cachedMovies.length > 0) {
                        console.log('📦 Using cached movies for initial load');
                        skeletonLoader.style.display = 'none';
                        movieGrid.style.display = 'grid';
                        currentlyLoadedMovies = cachedMovies;
                        renderMovies(cachedMovies);
                        isFetchingMore = false;
                        return;
                    }
                }

                try {
                    const [sortField, sortDirection] = currentSort.split('_');
                    const moviesCollection = collection(db, 'movies');
                    
                    let queryConstraints = [];
                    if (currentFilter !== 'All') {
                        queryConstraints.push(where('categories', 'array-contains', currentFilter));
                    }
                    queryConstraints.push(orderBy(sortField, sortDirection));
                    if (!isInitial && lastVisible) {
                        queryConstraints.push(startAfter(lastVisible));
                    }
                    queryConstraints.push(limit(MOVIES_PER_PAGE));

                    const q = query(moviesCollection, ...queryConstraints);
                    const snapshot = await getDocs(q);

                    skeletonLoader.style.display = 'none';

                    if (snapshot.empty) {
                        if (isInitial) {
                            let message = `This section is empty.`;
                            if (currentFilter !== 'All') {
                                message = `No movie or series found for "${currentFilter}".`;
                            }
                            noMoviesMessage.querySelector('p').textContent = message;
                            noMoviesMessage.style.display = 'block';
                            movieGrid.style.display = 'none';
                        }
                        lastVisible = null; 
                    } else {
                        movieGrid.style.display = 'grid';
                        lastVisible = snapshot.docs[snapshot.docs.length - 1];
                        const newMovies = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        
                        if (isInitial) {
                            currentlyLoadedMovies = newMovies;
                            // Save to cache
                            saveMoviesToCache(newMovies);
                        } else {
                            currentlyLoadedMovies.push(...newMovies);
                        }
                        
                        appendMovies(newMovies.filter(m => m.status === 'active'));
                    }
                } catch (error) {
                    console.error("Error fetching movies:", error);
                    skeletonLoader.style.display = 'none';
                    noMoviesMessage.innerHTML = `<p>Could not load data. Please check your internet connection.</p>`;
                    noMoviesMessage.style.display = 'block';
                } finally {
                    isFetchingMore = false;
                }
            };
            
            const performSearch = async () => {
                const searchTerm = searchBar.value.trim();
                if (!searchTerm) {
                    movieGrid.classList.remove('list-view');
                    // Try cache first for reset
                    const cachedMovies = loadCachedMovies();
                    if (cachedMovies && cachedMovies.length > 0) {
                        skeletonLoader.style.display = 'none';
                        movieGrid.style.display = 'grid';
                        currentlyLoadedMovies = cachedMovies;
                        renderMovies(cachedMovies);
                        return;
                    }
                    fetchAndRenderMovies(true, true);
                    return;
                }
                
                const searchTermLower = searchTerm.toLowerCase();
                movieGrid.innerHTML = '';
                movieGrid.style.display = 'none';
                noMoviesMessage.style.display = 'none';
                skeletonLoader.style.display = 'grid';

                try {
                    const moviesCollection = collection(db, 'movies');
                    const q = query(moviesCollection, where('status', '==', 'active'));
                    const snapshot = await getDocs(q);
                    skeletonLoader.style.display = 'none';
                    
                    const filteredMovies = snapshot.docs
                        .map(doc => ({ id: doc.id, ...doc.data() }))
                        .filter(movie => movie.title && movie.title.toLowerCase().includes(searchTermLower));
                    
                    currentlyLoadedMovies = filteredMovies;
                    movieGrid.classList.add('list-view');
                    renderMovies(filteredMovies.slice(0, 50));

                    if (filteredMovies.length === 0) {
                        noMoviesMessage.querySelector('p').textContent = `"${searchTerm}" এর জন্য কোনো কন্টেন্ট পাওয়া যায়নি।`;
                        noMoviesMessage.style.display = 'block';
                    }
                } catch (error) {
                    console.error("Error fetching movies for search:", error);
                    skeletonLoader.style.display = 'none';
                    noMoviesMessage.innerHTML = `<p>সার্চ করতে একটি সমস্যা হয়েছে।</p>`;
                    noMoviesMessage.style.display = 'block';
                }
            };
            
            const appendMovies = (moviesToAppend) => {
                const fragment = document.createDocumentFragment();
                const isListView = movieGrid.classList.contains('list-view');

                moviesToAppend.forEach(movie => {
                    const movieCard = document.createElement('div');
                    movieCard.className = 'movie-card';
                    movieCard.dataset.movieId = movie.id;

                    const isSeries = movie.type !== 'movie';
                    let seriesInfoHTML = '';
                    
                    if (isSeries && movie.seasons && movie.seasons.length > 0) {
                        const sortedSeasons = [...movie.seasons].sort((a, b) => b.season_number - a.season_number);
                        const latestSeason = sortedSeasons[0];
                        if (latestSeason && latestSeason.episodes && latestSeason.episodes.length > 0) {
                            const sortedEpisodes = [...latestSeason.episodes].sort((a, b) => {
                                const highestA = parseEpisodeNumber(a.episode_number).highest;
                                const highestB = parseEpisodeNumber(b.episode_number).highest;
                                return highestB - highestA;
                            });
                            const latestEpisode = sortedEpisodes[0];
                            if (latestEpisode) {
                                const latestEpisodeInfo = parseEpisodeNumber(latestEpisode.episode_number);
                                seriesInfoHTML = `<p class="movie-series-info">S${latestSeason.season_number} | E${latestEpisodeInfo.highest}</p>`;
                            }
                        }
                    }

                    let cardHTML = '';
                    let languageBadgeHTML = movie.language ? `<div class="language-badge">${movie.language}</div>` : '';
                    let uploadDateHTML = '';
                    if (movie.createdAt && typeof movie.createdAt.toDate === 'function') {
                        const uploadDate = movie.createdAt.toDate();
                        const formattedDate = uploadDate.toLocaleDateString('en-GB');
                        uploadDateHTML = `<div class="upload-date-badge">${formattedDate}</div>`;
                    }

                    if (isListView) {
                        cardHTML = `
                            <div class="movie-poster">
                                ${uploadDateHTML}${languageBadgeHTML}
                                <img src="${movie.posterUrl}" alt="${movie.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/222/fff?text=Error'">
                            </div>
                            <div class="movie-info">
                                <h3 class="movie-title">${movie.title}</h3>
                                <p class="movie-description-snippet">${movie.description || 'No description available.'}</p>
                                <p class="movie-genres"><b>Genres:</b> ${movie.genres || 'N/A'}</p>
                                ${seriesInfoHTML}
                                <p class="movie-rating"><i class="fas fa-star" style="color:gold;"></i> ${movie.rating || 'N/A'}/10</p>
                                <p class="movie-year"><b>Year:</b> ${movie.year || 'N/A'}</p>
                            </div>`;
                    } else {
                        cardHTML = `
                            <div class="movie-poster">
                                ${uploadDateHTML}${languageBadgeHTML}
                                <img src="${movie.posterUrl}" alt="${movie.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/222/fff?text=Error'">
                            </div>
                            <div class="movie-info">
                                <h3 class="movie-title">${movie.title}</h3>
                                <p class="movie-genres">${movie.genres || ''}</p>
                                ${seriesInfoHTML}
                                <p class="movie-rating"><i class="fas fa-star" style="color:gold;"></i> ${movie.rating || 'N/A'}/10</p>
                                <p class="movie-year">${movie.year || 'N/A'}</p>
                            </div>`;
                    }
                    movieCard.innerHTML = cardHTML;
                    fragment.appendChild(movieCard);
                });
                movieGrid.appendChild(fragment);
            };

            const renderMovies = (moviesToRender) => {
                movieGrid.innerHTML = '';
                const activeMovies = moviesToRender.filter(movie => movie.status === 'active');
                if (activeMovies.length === 0) {
                    noMoviesMessage.querySelector('p').textContent = "The content you are looking for is not available.";
                    noMoviesMessage.style.display = 'block';
                    movieGrid.style.display = 'none';
                } else {
                    noMoviesMessage.style.display = 'none';
                    movieGrid.style.display = movieGrid.classList.contains('list-view') ? 'block' : 'grid';
                    appendMovies(activeMovies);
                }
            };

            const renderSocialLinks = async () => {
                try {
                    const q = query(collection(db, 'socialLinks'));
                    const snapshot = await getDocs(q);
                    socialIconsContainer.innerHTML = snapshot.docs.map(doc => `<a href="${doc.data().url}" target="_blank"><img src="${doc.data().imageUrl}" alt="Social Icon"></a>`).join('');
                } catch (error) { console.error("Error setting up social links:", error); }
            };

            const setupFilters = async () => {
                try {
                    const q = query(collection(db, 'filters'), orderBy('name'));
                    const filtersSnapshot = await getDocs(q);
                    const filters = filtersSnapshot.docs.map(doc => doc.data().name);
                    filterContainer.innerHTML = '';
                    const allFilter = document.createElement('div');
                    allFilter.className = 'filter active';
                    allFilter.textContent = 'All';
                    allFilter.dataset.filter = 'All';
                    filterContainer.appendChild(allFilter);
                    filters.forEach(name => {
                        const filterEl = document.createElement('div');
                        filterEl.className = 'filter';
                        filterEl.textContent = name;
                        filterEl.dataset.filter = name;
                        filterContainer.appendChild(filterEl);
                    });
                } catch (error) { console.error("Error setting up filters:", error); }
            };

            const loadWelcomePopupSettings = async () => {
                try {
                    const popupDoc = await getDoc(doc(db, 'settings', 'welcomePopup'));
                    if (popupDoc.exists()) {
                        const data = popupDoc.data();
                        if (data.enabled && !hasShownPopup) {
                            welcomePopupImg.src = data.imageUrl || '';
                            welcomePopupTitle.textContent = data.title || 'Welcome to Baflix!';
                            welcomePopupDescription.textContent = data.description || 'Enjoy unlimited streaming of movies and series.';
                            popupLinkUrl = data.linkUrl || '';
                            showWelcomePopup();
                            hasShownPopup = true;
                        }
                    }
                } catch (error) {
                    console.error("Error loading welcome popup settings:", error);
                }
            };

            const showWelcomePopup = () => {
                welcomePopup.classList.add('visible');
                popupTimeLeft = 5;
                welcomePopupTimer.textContent = `${popupTimeLeft}s`;
                welcomePopupClose.classList.remove('visible');
                if (popupTimer) clearInterval(popupTimer);
                popupTimer = setInterval(() => {
                    popupTimeLeft--;
                    welcomePopupTimer.textContent = `${popupTimeLeft}s`;
                    if (popupTimeLeft <= 0) {
                        clearInterval(popupTimer);
                        welcomePopupClose.classList.add('visible');
                        welcomePopupTimer.style.display = 'none';
                    }
                }, 1000);
            };

            const closeWelcomePopup = () => {
                welcomePopup.classList.remove('visible');
                if (popupTimer) clearInterval(popupTimer);
                welcomePopupTimer.style.display = 'block';
            };

            welcomePopupClose.addEventListener('click', (e) => {
                e.stopPropagation();
                closeWelcomePopup();
            });
            welcomePopupContent.addEventListener('click', () => {
                if (popupLinkUrl) openSafeLink(popupLinkUrl);
                closeWelcomePopup();
            });

            const copyToClipboard = (text, button) => {
                const originalText = button.innerHTML;
                const showSuccess = () => {
                    button.innerHTML = `<i class="fas fa-check"></i> Copied!`;
                    setTimeout(() => { button.innerHTML = originalText; }, 2000);
                };
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(showSuccess).catch(() => fallbackCopy(text, button, originalText));
                } else {
                    fallbackCopy(text, button, originalText);
                }
            };
            const fallbackCopy = (text, button, originalText) => {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.top = '-9999px';
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        button.innerHTML = `<i class="fas fa-check"></i> Copied!`;
                        setTimeout(() => { button.innerHTML = originalText; }, 2000);
                    }
                } catch (err) { console.error("Error during fallback copy:", err); }
                document.body.removeChild(textArea);
            };

            let tg = null;
            const saveOrUpdateTelegramUser = async (user) => {
                if (!user || !user.id) return;
                const userDocRef = doc(db, "telegramUsers", String(user.id));
                try {
                    const docSnap = await getDoc(userDocRef);
                    const now = new Date();
                    const userData = {
                        id: user.id,
                        firstName: user.first_name || '',
                        lastName: user.last_name || '',
                        username: user.username || '',
                        lastSeen: serverTimestamp(),
                        lastActive: serverTimestamp(),
                        lastVisit: now.toISOString(),
                        visitCount: increment(1)
                    };
                    if (docSnap.exists()) {
                        await updateDoc(userDocRef, userData);
                        const currentVisits = (docSnap.data().visitCount || 0) + 1;
                        if (currentVisits % 5 === 0 && !localStorage.getItem('userInfoShown')) {
                            setTimeout(() => userInfoSection.classList.add('visible'), 1000);
                        }
                    } else {
                        userData.createdAt = serverTimestamp();
                        userData.status = 'active';
                        userData.visitCount = 1;
                        userData.firstVisit = now.toISOString();
                        await setDoc(userDocRef, userData);
                        setTimeout(() => {
                            if (!localStorage.getItem('userInfoShown')) {
                                userInfoSection.classList.add('visible');
                            }
                        }, 1000);
                    }
                    const fullName = user.first_name + (user.last_name ? ' ' + user.last_name : '');
                    if (welcomeUserName) welcomeUserName.textContent = `Welcome, ${fullName}!`;
                    if (userTelegramName) userTelegramName.textContent = fullName;
                    if (userChatId) userChatId.textContent = user.id;
                    if (userUsername) userUsername.textContent = user.username ? '@' + user.username : 'No username';
                } catch (error) { console.error("Error saving or updating user data:", error); }
            };
            
            const logVisit = async (user) => {
                try {
                    await addDoc(collection(db, "visits"), {
                        timestamp: serverTimestamp(),
                        userId: user ? String(user.id) : 'anonymous',
                        userAgent: navigator.userAgent,
                        platform: navigator.platform,
                        language: navigator.language
                    });
                } catch (error) { console.error("Failed to log visit:", error); }
            };

            // ===== MAIN INITIALIZATION =====
            const initializeApp = async (tgInstance) => {
                console.log("🚀 Initializing app...");
                
                // ===== CHECK IF BACK/FORWARD NAVIGATION =====
                const isBackForward = isBackForwardNavigation() || isFromBFCache();
                console.log('🔄 Navigation type - isBackForward:', isBackForward);
                
                if (tgInstance) {
                    tg = tgInstance;
                    tg.expand();
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        await saveOrUpdateTelegramUser(tg.initDataUnsafe.user);
                        await logVisit(tg.initDataUnsafe.user);
                    } else {
                        await logVisit(null);
                    }
                } else {
                    await logVisit(null);
                }
                
                await Promise.all([renderSocialLinks(), setupFilters()]);
                
                // ===== LOAD FROM CACHE IF BACK/FORWARD =====
                if (isBackForward) {
                    const cachedMovies = loadCachedMovies();
                    if (cachedMovies && cachedMovies.length > 0) {
                        console.log('📦 Back/Forward: Loading from cache');
                        skeletonLoader.style.display = 'none';
                        movieGrid.style.display = 'grid';
                        currentlyLoadedMovies = cachedMovies;
                        renderMovies(cachedMovies);
                        // Still load welcome popup if needed
                        await loadWelcomePopupSettings();
                        console.log("✅ App initialization complete (from cache)");
                        return;
                    } else {
                        console.log('⚠️ No cache found for back/forward, loading fresh');
                    }
                }
                
                // Normal load
                await loadWelcomePopupSettings();
                await fetchAndRenderMovies(true, true);
                console.log("✅ App initialization complete");
            };

            // Event Listeners
            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                performSearch();
                searchBar.blur();
            });

            searchBar.addEventListener('input', () => {
                if (searchBar.value.trim() === '') {
                    movieGrid.classList.remove('list-view');
                    // Try cache first
                    const cachedMovies = loadCachedMovies();
                    if (cachedMovies && cachedMovies.length > 0) {
                        skeletonLoader.style.display = 'none';
                        movieGrid.style.display = 'grid';
                        currentlyLoadedMovies = cachedMovies;
                        renderMovies(cachedMovies);
                    } else {
                        fetchAndRenderMovies(true, true);
                    }
                }
            });

            filterContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter')) {
                    const newFilter = e.target.dataset.filter;
                    if (newFilter === currentFilter) return;
                    currentFilter = newFilter;
                    searchBar.value = '';
                    document.querySelector('.filter.active').classList.remove('active');
                    e.target.classList.add('active');
                    // Clear cache when filter changes
                    clearCache();
                    fetchAndRenderMovies(true, false);
                }
            });

            sortBySelect.addEventListener('change', (e) => {
                currentSort = e.target.value;
                // Clear cache when sort changes
                clearCache();
                fetchAndRenderMovies(true, false);
            });

            // ========== মুভি কার্ডে ক্লিক ইভেন্ট ==========
            movieGrid.addEventListener('click', (e) => {
                const card = e.target.closest('.movie-card');
                if (card && card.dataset.movieId) {
                    console.log('🎬 Movie card clicked, ID:', card.dataset.movieId);
                    openMovieDetails(card.dataset.movieId);
                }
            });

            homeLogo.addEventListener('click', () => {
                // Clear cache and go home
                clearCache();
                const currentPath = window.location.pathname;
                const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
                const homeUrl = `${basePath}index.html`;
                window.location.href = homeUrl;
            });

            window.addEventListener('scroll', () => {
                if (movieGrid.classList.contains('list-view') || isFetchingMore || !lastVisible) return;
                const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
                if (clientHeight + scrollTop >= scrollHeight - 300) {
                    fetchAndRenderMovies(false, false);
                }
            });

            window.closeUserInfo = () => {
                userInfoSection.classList.remove('visible');
                localStorage.setItem('userInfoShown', 'true');
            };

            window.copyToClipboard = (elementId) => {
                const element = document.getElementById(elementId);
                if (element) {
                    const text = element.textContent;
                    const tempInput = document.createElement('input');
                    tempInput.value = text;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempInput);
                    const copyBtn = event.currentTarget;
                    const originalHTML = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<i class="fas fa-check"></i>';
                    setTimeout(() => { copyBtn.innerHTML = originalHTML; }, 2000);
                }
            };

            const handleConnectionChange = () => {
                if (!navigator.onLine) {
                    skeletonLoader.style.display = 'none';
                    noMoviesMessage.innerHTML = `<p>You are offline. Please check your internet connection.</p>`;
                    noMoviesMessage.style.display = 'block';
                }
            };
            
            window.addEventListener('online', () => window.location.reload());
            window.addEventListener('offline', handleConnectionChange);
            
            try {
                if (!navigator.onLine) {
                    handleConnectionChange();
                    return;
                }
                const webApp = window.Telegram?.WebApp;
                if (webApp && webApp.initData) {
                    initializeApp(webApp);
                } else {
                    initializeApp(null);
                }
            } catch (error) {
                console.error('An error occurred during initialization:', error);
                initializeApp(null);
            }
        });
    </script>
</body>
</html>
