<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baflix - Movie Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default,es6,fetch"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #e50914; --secondary: #b81d24; --dark: #141414; --light-dark: #222; --text: #fff; --text-secondary: #aaa; --green: #28a745; --dark-green: #218838; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        
        .back-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 50%;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .back-header .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #e50914, #f5f5f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        #loading-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            flex-direction: column;
            gap: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .details-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            display: none;
        }

        .movie-header {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }
        .movie-poster-large {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .movie-poster-large img {
            width: 100%;
            display: block;
        }
        .movie-info-details {
            flex: 1;
        }
        .movie-title-large {
            font-size: 2.2rem;
            margin-bottom: 10px;
            line-height: 1.2;
        }
        .movie-meta {
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-size: 1rem;
        }
        #details-series-info {
            font-weight: bold;
            color: var(--green);
        }
        .trailer-btn {
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            transition: background 0.3s;
            font-size: 1rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }
        .trailer-btn:hover {
            background: var(--secondary);
        }

        .movie-description-full {
            padding: 20px 0;
            font-size: 1rem;
            line-height: 1.8;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            margin-bottom: 25px;
        }

        .actions-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }
        .action-btn {
            background: #007bff;
            color: #fff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            transition: background 0.3s;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }
        .action-btn.copy {
            background: #6c757d;
        }
        .action-btn:hover {
            opacity: 0.8;
        }

        /* Download Buttons */
        .download-btn {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            background-size: 300% 300%;
            color: #fff;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            display: block;
            width: 100%;
            margin: 10px 0;
            border: none;
            box-shadow: 0 5px 15px rgba(220, 39, 67, 0.4);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: instaGradient 5s ease infinite;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .download-btn::before {
            content: '\f019';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            margin-right: 10px;
        }
        @keyframes instaGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .download-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(220, 39, 67, 0.6);
        }
        .download-btn:active {
            transform: translateY(1px) scale(0.98);
        }

        .downloads-section {
            margin-top: 20px;
        }

        /* Season Accordion */
        .season-accordion {
            margin-bottom: 8px;
        }
        .season-accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            width: 100%;
            border-radius: 8px;
            background: linear-gradient(145deg, #2c3e50, #34495e);
            border: 1px solid #4a627a;
            transition: all 0.3s ease;
        }
        .season-accordion-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            background: linear-gradient(145deg, #34495e, #4a627a);
        }
        .season-accordion-header h4 {
            font-size: 1.1rem;
            color: var(--text);
            font-weight: bold;
            margin: 0;
        }
        .season-accordion-header .fas {
            transition: transform 0.3s ease;
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .season-accordion.active .season-accordion-header {
            background: linear-gradient(145deg, #3a506b, #4a627a);
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }
        .season-accordion.active .season-accordion-header .fas {
            transform: rotate(180deg);
            color: var(--text);
        }
        .season-accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), padding 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: rgba(0,0,0,0.2);
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            padding: 0 15px;
        }
        .season-accordion.active .season-accordion-content {
            max-height: 3000px;
            padding: 20px 15px 10px;
        }
        .episode-container {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #383838;
        }
        .episode-container:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .episode-title {
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* Trailer Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #000;
            width: 95%;
            max-width: 900px;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }
        .modal-close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 2;
            line-height: 1;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Error */
        #error-message {
            text-align: center;
            padding: 50px 20px;
            display: none;
        }
        #error-message i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 20px;
        }
        #error-message h2 {
            color: var(--text);
            margin-bottom: 10px;
        }
        #error-message p {
            color: var(--text-secondary);
        }

        @media (min-width: 600px) {
            .movie-header {
                flex-direction: row;
                align-items: flex-start;
            }
            .movie-poster-large {
                max-width: 250px;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Back Header -->
    <div class="back-header">
        <button class="back-btn" id="back-btn" aria-label="Go back">
            <i class="fas fa-arrow-left"></i>
        </button>
        <span class="logo-text">Baflix</span>
    </div>

    <!-- Loading -->
    <div id="loading-indicator">
        <div class="spinner"></div>
        <p style="color: var(--text-secondary);">Loading movie details...</p>
    </div>

    <!-- Error -->
    <div id="error-message">
        <i class="fas fa-exclamation-circle"></i>
        <h2>Movie Not Found</h2>
        <p>The movie you're looking for doesn't exist or has been removed.</p>
        <button class="action-btn" style="margin-top: 20px;" onclick="goHome()">
            <i class="fas fa-home"></i> Go Home
        </button>
    </div>

    <!-- Details Container -->
    <div class="details-container" id="details-container">
        <div class="movie-header" id="movie-header">
            <div class="movie-poster-large">
                <img id="detail-poster" src="" alt="Poster" onerror="this.src='https://via.placeholder.com/300x450/222/fff?text=No+Image'">
            </div>
            <div class="movie-info-details">
                <h1 class="movie-title-large" id="detail-title"></h1>
                <p class="movie-meta" id="detail-genres"></p>
                <p class="movie-meta" id="detail-rating"></p>
                <p class="movie-meta" id="detail-year"></p>
                <p class="movie-meta" id="detail-language"></p>
                <p class="movie-meta" id="detail-series-info"></p>
                <div id="detail-trailer-container"></div>
            </div>
        </div>

        <div class="movie-description-full" id="detail-description"></div>

        <div class="actions-section" id="detail-actions"></div>

        <div class="downloads-section" id="detail-downloads"></div>
    </div>

    <!-- Trailer Modal -->
    <div id="trailer-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" id="trailer-close-btn">&times;</button>
            <div class="video-container">
                <iframe id="youtube-trailer-iframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3okSnZJrF9ooUp12KihKISR2VRZq5Ju8",
            authDomain: "baflix-man.firebaseapp.com",
            projectId: "baflix-man",
            storageBucket: "baflix-man.firebasestorage.app",
            messagingSenderId: "1041860946828",
            appId: "1:1041860946828:web:fa8b976dc07ced6ce704a9",
            measurementId: "G-XDZ9EFWCX5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loadingIndicator = document.getElementById('loading-indicator');
        const detailsContainer = document.getElementById('details-container');
        const errorMessage = document.getElementById('error-message');
        const backBtn = document.getElementById('back-btn');

        const modalOverlay = document.getElementById('trailer-modal');
        const trailerIframe = document.getElementById('youtube-trailer-iframe');
        const trailerCloseBtn = document.getElementById('trailer-close-btn');

        // Helper functions
        const parseEpisodeNumber = (epNumStr) => {
            const str = String(epNumStr).trim();
            if (str.includes('-')) {
                const parts = str.split('-').map(num => parseInt(num.trim(), 10));
                if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                    const [start, end] = parts;
                    const count = Math.abs(end - start) + 1;
                    const highest = Math.max(start, end);
                    return { count, highest };
                }
            }
            const singleNum = parseInt(str, 10);
            if (!isNaN(singleNum)) {
                return { count: 1, highest: singleNum };
            }
            return { count: 1, highest: 0 };
        };

        const getYoutubeVideoId = (url) => {
            if(!url) return null;
            let videoId = null;
            try {
                const urlObj = new URL(url);
                if (urlObj.hostname === 'youtu.be') videoId = urlObj.pathname.slice(1);
                else if (urlObj.hostname.includes('youtube.com')) videoId = urlObj.searchParams.get('v');
            } catch (e) {
                const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
                const match = url.match(regex);
                if (match) videoId = match[1];
            }
            return videoId;
        };

        const openSafeLink = (url) => {
            const tgApp = window.Telegram?.WebApp;
            if (tgApp && tgApp.initData) {
                if (url.includes('t.me/')) {
                    try {
                        tgApp.openTelegramLink(url);
                    } catch (e) {
                        tgApp.openLink(url);
                    }
                } else {
                    tgApp.openLink(url);
                }
            } else {
                window.open(url, '_blank');
            }
        };

        const incrementDownloadCount = async (movieId) => {
            if (!movieId) return;
            const movieRef = doc(db, 'movies', movieId);
            try {
                await updateDoc(movieRef, {
                    downloadCount: increment(1)
                });
            } catch (error) {
                console.error("Error incrementing download count:", error);
            }
        };

        const copyToClipboard = (text, button) => {
            const originalText = button.innerHTML;
            const showSuccess = () => {
                button.innerHTML = `<i class="fas fa-check"></i> Copied!`;
                setTimeout(() => { button.innerHTML = originalText; }, 2000);
            };
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(showSuccess).catch(() => {
                    fallbackCopy(text, button, originalText);
                });
            } else {
                fallbackCopy(text, button, originalText);
            }
        };

        const fallbackCopy = (text, button, originalText) => {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.top = '-9999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    button.innerHTML = `<i class="fas fa-check"></i> Copied!`;
                    setTimeout(() => { button.innerHTML = originalText; }, 2000);
                }
            } catch (err) { console.error("Error during fallback copy:", err); }
            document.body.removeChild(textArea);
        };

        const goHome = () => {
            const tgApp = window.Telegram?.WebApp;
            if (tgApp && tgApp.initData) {
                tgApp.close();
            } else {
                window.location.href = 'index.html';
            }
        };

        window.goHome = goHome;

        // Back button
        backBtn.addEventListener('click', goHome);

        // Trailer modal
        trailerCloseBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('visible');
            trailerIframe.src = '';
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('visible');
                trailerIframe.src = '';
            }
        });

        // Extract movie ID from URL
        const getMovieIdFromUrl = () => {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        };

        // Load movie details
        const loadMovieDetails = async (movieId) => {
            if (!movieId) {
                loadingIndicator.style.display = 'none';
                errorMessage.style.display = 'block';
                return;
            }

            try {
                const movieRef = doc(db, 'movies', movieId);
                const docSnap = await getDoc(movieRef);

                if (!docSnap.exists()) {
                    loadingIndicator.style.display = 'none';
                    errorMessage.style.display = 'block';
                    return;
                }

                const movie = { id: docSnap.id, ...docSnap.data() };

                if (movie.status !== 'active') {
                    loadingIndicator.style.display = 'none';
                    errorMessage.style.display = 'block';
                    return;
                }

                renderMovieDetails(movie);
                loadingIndicator.style.display = 'none';
                detailsContainer.style.display = 'block';

            } catch (error) {
                console.error("Error loading movie:", error);
                loadingIndicator.style.display = 'none';
                errorMessage.style.display = 'block';
            }
        };

        const renderMovieDetails = (movie) => {
            // Basic info
            document.getElementById('detail-poster').src = movie.posterUrl || 'https://via.placeholder.com/300x450/222/fff?text=No+Image';
            document.getElementById('detail-title').textContent = movie.title || 'Untitled';
            document.getElementById('detail-genres').textContent = movie.genres || 'N/A';
            document.getElementById('detail-rating').innerHTML = `<i class="fas fa-star" style="color:gold;"></i> ${movie.rating || 'N/A'}/10`;
            document.getElementById('detail-year').textContent = `Year: ${movie.year || 'N/A'}`;
            document.getElementById('detail-language').textContent = `Language: ${movie.language || 'N/A'}`;
            document.getElementById('detail-description').textContent = movie.description || 'No description available.';

            // Series info
            const seriesInfoEl = document.getElementById('detail-series-info');
            const isSeries = movie.type !== 'movie';

            if (isSeries && movie.seasons && movie.seasons.length > 0) {
                const seasonCount = movie.seasons.length;
                const episodeCount = movie.seasons.reduce((totalAcc, season) => {
                    if (!season.episodes || season.episodes.length === 0) return totalAcc;
                    const seasonEpisodeCount = season.episodes.reduce((seasonAcc, episode) => {
                        const episodeInfo = parseEpisodeNumber(episode.episode_number);
                        return seasonAcc + episodeInfo.count;
                    }, 0);
                    return totalAcc + seasonEpisodeCount;
                }, 0);
                seriesInfoEl.textContent = `Total Seasons: ${seasonCount} | Total Episodes: ${episodeCount}`;
                seriesInfoEl.style.display = 'block';
            } else {
                seriesInfoEl.style.display = 'none';
            }

            // Trailer
            const trailerContainer = document.getElementById('detail-trailer-container');
            trailerContainer.innerHTML = '';
            if (movie.trailerUrl) {
                const trailerBtn = document.createElement('button');
                trailerBtn.className = 'trailer-btn';
                trailerBtn.innerHTML = `<i class="fas fa-play"></i> Watch Trailer`;
                trailerBtn.onclick = () => {
                    const videoId = getYoutubeVideoId(movie.trailerUrl);
                    if (videoId) {
                        trailerIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&fs=0&rel=0`;
                        modalOverlay.classList.add('visible');
                    } else {
                        alert("Invalid trailer link provided.");
                    }
                };
                trailerContainer.appendChild(trailerBtn);
            }

            // Actions
            const actionsContainer = document.getElementById('detail-actions');
            actionsContainer.innerHTML = '';

            const botUsername = "BaflixStreamBot";
            const deepLink = `https://t.me/${botUsername}?startapp=movie_${movie.id}`;
            const shareMessage = `🎬 "${movie.title}" Watch now on Baflix!\n\nClick on the link to watch the movie `;
            const fullTextToCopy = `${shareMessage}\n${deepLink}`;

            const shareBtn = document.createElement('button');
            shareBtn.className = 'action-btn';
            shareBtn.innerHTML = `<i class="fas fa-share-alt"></i> Share`;
            shareBtn.onclick = () => {
                const telegramShareUrl = `https://t.me/share/url?url=${encodeURIComponent(deepLink)}&text=${encodeURIComponent(shareMessage)}`;
                openSafeLink(telegramShareUrl);
            };
            actionsContainer.appendChild(shareBtn);

            const copyBtn = document.createElement('button');
            copyBtn.className = 'action-btn copy';
            copyBtn.innerHTML = `<i class="fas fa-copy"></i> Copy Link`;
            copyBtn.onclick = (e) => copyToClipboard(fullTextToCopy, e.currentTarget);
            actionsContainer.appendChild(copyBtn);

            // Downloads
            const downloadsContainer = document.getElementById('detail-downloads');
            downloadsContainer.innerHTML = '';

            if (movie.type === 'movie' && movie.downloadLinks && movie.downloadLinks.length > 0) {
                const linksWrapper = document.createElement('div');
                movie.downloadLinks.forEach(link => {
                    const button = document.createElement('button');
                    button.textContent = link.name;
                    button.className = 'download-btn';

                    let currentBtnAdLinks = [];
                    if (link.ads && typeof link.ads === 'string' && link.ads.trim() !== '') {
                        currentBtnAdLinks = link.ads.split(',').map(u => u.trim()).filter(u => u);
                    }

                    let clickCount = 0;

                    button.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();

                        if (currentBtnAdLinks.length > 0 && clickCount < currentBtnAdLinks.length) {
                            openSafeLink(currentBtnAdLinks[clickCount]);
                            clickCount++;
                        } else {
                            incrementDownloadCount(movie.id);
                            if (link.url) {
                                openSafeLink(link.url);
                            }
                        }
                    });
                    button.addEventListener('contextmenu', (e) => e.preventDefault());
                    linksWrapper.appendChild(button);
                });
                downloadsContainer.appendChild(linksWrapper);
            } else if (movie.seasons && movie.seasons.length > 0) {
                movie.seasons.sort((a, b) => a.season_number - b.season_number).forEach(season => {
                    const seasonAccordion = document.createElement('div');
                    seasonAccordion.className = 'season-accordion';

                    const seasonHeader = document.createElement('div');
                    seasonHeader.className = 'season-accordion-header';
                    seasonHeader.innerHTML = `<h4>Season ${season.season_number}</h4><i class="fas fa-chevron-down"></i>`;

                    const seasonContent = document.createElement('div');
                    seasonContent.className = 'season-accordion-content';

                    if (season.episodes && season.episodes.length > 0) {
                        season.episodes.sort((a, b) => {
                            const highestA = parseEpisodeNumber(a.episode_number).highest;
                            const highestB = parseEpisodeNumber(b.episode_number).highest;
                            return highestA - highestB;
                        }).forEach(episode => {
                            const episodeContainer = document.createElement('div');
                            episodeContainer.className = 'episode-container';

                            const episodeTitle = document.createElement('p');
                            episodeTitle.className = 'episode-title';
                            episodeTitle.textContent = `Episode ${episode.episode_number}` + (episode.title ? `: ${episode.title}` : '');
                            episodeContainer.appendChild(episodeTitle);

                            if (episode.downloadLinks && episode.downloadLinks.length > 0) {
                                episode.downloadLinks.forEach(link => {
                                    const button = document.createElement('button');
                                    button.textContent = link.name;
                                    button.className = 'download-btn';

                                    let currentBtnAdLinks = [];
                                    if (link.ads && typeof link.ads === 'string' && link.ads.trim() !== '') {
                                        currentBtnAdLinks = link.ads.split(',').map(u => u.trim()).filter(u => u);
                                    }

                                    let clickCount = 0;

                                    button.addEventListener('click', (e) => {
                                        e.preventDefault();
                                        e.stopPropagation();

                                        if (currentBtnAdLinks.length > 0 && clickCount < currentBtnAdLinks.length) {
                                            openSafeLink(currentBtnAdLinks[clickCount]);
                                            clickCount++;
                                        } else {
                                            incrementDownloadCount(movie.id);
                                            if (link.url) {
                                                openSafeLink(link.url);
                                            }
                                        }
                                    });
                                    button.addEventListener('contextmenu', (e) => e.preventDefault());
                                    episodeContainer.appendChild(button);
                                });
                            } else {
                                const noLinksText = document.createElement('p');
                                noLinksText.textContent = 'No links for this episode.';
                                noLinksText.style.cssText = "font-size: 0.8rem; color: #777;";
                                episodeContainer.appendChild(noLinksText);
                            }
                            seasonContent.appendChild(episodeContainer);
                        });
                    }
                    seasonAccordion.appendChild(seasonHeader);
                    seasonAccordion.appendChild(seasonContent);
                    downloadsContainer.appendChild(seasonAccordion);
                });

                // Accordion toggle
                downloadsContainer.addEventListener('click', function(e) {
                    const header = e.target.closest('.season-accordion-header');
                    if (header) {
                        const accordion = header.parentElement;
                        accordion.classList.toggle('active');
                    }
                });
            }

            // Telegram BackButton
            const tgApp = window.Telegram?.WebApp;
            if (tgApp && tgApp.BackButton) {
                tgApp.BackButton.onClick(goHome);
                tgApp.BackButton.show();
            }
        };

        // Handle Telegram back button
        const tgApp = window.Telegram?.WebApp;
        if (tgApp && tgApp.BackButton) {
            tgApp.BackButton.onClick(goHome);
            tgApp.BackButton.show();
        }

        // Initial load
        const movieId = getMovieIdFromUrl();
        loadMovieDetails(movieId);
    </script>
</body>
</html>
